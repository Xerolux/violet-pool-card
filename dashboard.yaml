# =============================
# 📋 LOVELACE DASHBOARD KONFIGURATION
# =============================

lovelace:
  title: Violet Pool Controller Dashboard
  icon: mdi:swimming

  views:
    # 🎛️ HAUPTÜBERSICHT
    - title: Übersicht
      icon: mdi:view-dashboard
      cards:
        - type: custom:violet-pool-card
          card_type: overview
          theme: luxury
          size: medium
          animation: smooth

        - type: custom:violet-pool-card
          card_type: pump
          entity: switch.violet_pool_controller_filterpumpe
          theme: luxury
          size: medium

        - type: custom:violet-pool-card
          card_type: heater
          entity: climate.violet_pool_controller_heizung
          theme: luxury
          size: medium

        - type: custom:violet-pool-card
          card_type: solar
          entity: climate.violet_pool_controller_solarabsorber
          theme: luxury
          size: medium

    # 💧 CHEMIE & DOSIERUNG
    - title: Chemie
      icon: mdi:beaker
      cards:
        - type: custom:violet-pool-card
          card_type: chemical
          pool_temp_entity: sensor.violet_pool_controller_beckenwasser
          ph_value_entity: sensor.violet_pool_controller_ph_wert
          orp_value_entity: sensor.violet_pool_controller_redoxpotential
          target_ph_entity: number.violet_pool_controller_ph_sollwert
          target_orp_entity: number.violet_pool_controller_redox_sollwert
          theme: luxury

        - type: custom:violet-pool-card
          card_type: dosing
          entity: switch.violet_pool_controller_chlor_dosierung
          dosing_type: chlorine
          theme: luxury
          size: medium

        - type: custom:violet-pool-card
          card_type: dosing
          entity: switch.violet_pool_controller_dosierung_ph
          dosing_type: ph_plus
          theme: luxury
          size: medium

    # 🔄 WARTUNG
    - title: Wartung
      icon: mdi:wrench
      cards:
        - type: custom:violet-pool-card
          card_type: backwash
          entity: switch.violet_pool_controller_ruckspulung
          theme: luxury
          size: medium

        - type: custom:violet-pool-card
          card_type: maintenance
          theme: luxury
          size: large

    # 📊 STATISTIKEN
    - title: Statistiken
      icon: mdi:chart-line
      cards:
        - type: custom:violet-pool-card
          card_type: statistics
          entity: sensor.violet_pool_controller_beckenwasser
          theme: luxury
          size: large

        - type: custom:violet-pool-card
          card_type: statistics
          entity: sensor.violet_pool_controller_ph_wert
          theme: luxury
          size: large

    # 🎛️ SYSTEM
    - title: System
      icon: mdi:cog
      cards:
        - type: custom:violet-pool-card
          card_type: system
          theme: luxury
          size: fullscreen
