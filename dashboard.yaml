# Violet Pool Controller Dashboard Configuration
# Vollständige Konfiguration aller verfügbaren Entitäten

# =============================
# 🎯 HAUPTSTEUERUNG (Main Controls)
# =============================

## Pumpe & Durchfluss
pump:
  pump_entity: switch.violet_pool_controller_filterpumpe
  pump_status: sensor.violet_pool_controller_pumpen_status
  pump_detail_status: sensor.violet_pool_controller_pumpen_detail_status
  pump_last_on: sensor.violet_pool_controller_pump_last_on
  pump_last_off: sensor.violet_pool_controller_pump_last_off
  pump_runtime: sensor.violet_pool_controller_pump_runtime
  pump_rpm_0: sensor.violet_pool_controller_pump_rpm_0
  pump_rpm_1: sensor.violet_pool_controller_pump_rpm_1
  pump_rpm_2: sensor.violet_pool_controller_pump_rpm_2
  pump_rpm_3: sensor.violet_pool_controller_pump_rpm_3
  pump_speed: number.violet_pool_controller_pumpengeschwindigkeit
  pump_mode: select.violet_pool_controller_pumpen_modus
  pump_flow: sensor.violet_pool_controller_pumpen_durchfluss
  flow_switch: sensor.violet_pool_controller_flow_switch
  flow_rate_4_20ma: sensor.violet_pool_controller_durchflussmesser_4_20ma

## Heizung
heating:
  heater_entity: switch.violet_pool_controller_heizung
  heater_climate: climate.violet_pool_controller_heizung
  heater_status: sensor.violet_pool_controller_heizungs_status
  heater_detail_status: sensor.violet_pool_controller_heizung_detail_status
  heater_target_temp: number.violet_pool_controller_heizung_zieltemperatur
  heater_mode: select.violet_pool_controller_heizungs_modus
  heater_last_on: sensor.violet_pool_controller_heater_last_on
  heater_last_off: sensor.violet_pool_controller_heater_last_off
  heater_runtime: sensor.violet_pool_controller_heater_runtime
  heater_postrun_time: sensor.violet_pool_controller_heater_postrun_time
  pool_water_temp: sensor.violet_pool_controller_beckenwasser

## Solar & Absorber
solar:
  solar_entity: switch.violet_pool_controller_solarabsorber
  solar_climate: climate.violet_pool_controller_solarabsorber
  solar_status: sensor.violet_pool_controller_solar_status
  solar_detail_status: sensor.violet_pool_controller_solar_detail_status
  solar_target_temp: number.violet_pool_controller_solar_zieltemperatur
  solar_mode: select.violet_pool_controller_solar_modus
  solar_last_on: sensor.violet_pool_controller_solar_last_on
  solar_last_off: sensor.violet_pool_controller_solar_last_off
  solar_runtime: sensor.violet_pool_controller_solar_runtime
  absorber_temp: sensor.violet_pool_controller_solarabsorber
  absorber_return: sensor.violet_pool_controller_absorber_rucklauf

## Abdeckung
cover:
  cover_entity: cover.violet_pool_controller_abdeckung
  cover_state: sensor.violet_pool_controller_cover_state
  cover_last_direction: sensor.violet_pool_controller_last_moving_direction

## Beleuchtung
light:
  light_entity: switch.violet_pool_controller_beleuchtung
  light_status: sensor.violet_pool_controller_beleuchtung_status
  light_last_on: sensor.violet_pool_controller_light_last_on
  light_last_off: sensor.violet_pool_controller_light_last_off
  light_runtime: sensor.violet_pool_controller_light_runtime

# =============================
# 💧 DOSIERUNG & CHEMIE (Dosing & Chemistry)
# =============================

dosing:
  ## Chlor Dosierung (Dosage 1)
  chlorine:
    entity: switch.violet_pool_controller_chlor_dosierung
    mode: select.violet_pool_controller_chlor_dosierung_modus
    status: sensor.violet_pool_controller_chlor_dosierung_status
    last_on: sensor.violet_pool_controller_dos_1_cl_last_on
    last_off: sensor.violet_pool_controller_dos_1_cl_last_off
    runtime: sensor.violet_pool_controller_dos_1_cl_runtime
    daily_amount: sensor.violet_pool_controller_dos_1_cl_daily_dosing_amount_ml
    total_amount: sensor.violet_pool_controller_dos_1_cl_total_can_amount_ml
    remaining_range: sensor.violet_pool_controller_dos_1_cl_remaining_range
    canister_volume: number.violet_pool_controller_chlor_kanister_volumen
    target_value: number.violet_pool_controller_chlor_sollwert
    can_reset: sensor.violet_pool_controller_dos_1_cl_last_can_reset

  ## pH+ Dosierung (Dosage 4)
  ph_plus:
    entity: switch.violet_pool_controller_dosierung_ph
    status: sensor.violet_pool_controller_ph_dosierung_status
    last_on: sensor.violet_pool_controller_dos_4_phm_last_on
    last_off: sensor.violet_pool_controller_dos_4_phm_last_off
    runtime: sensor.violet_pool_controller_dos_4_phm_runtime
    daily_amount: sensor.violet_pool_controller_dos_4_phm_daily_dosing_amount_ml
    total_amount: sensor.violet_pool_controller_dos_4_phm_total_can_amount_ml
    remaining_range: sensor.violet_pool_controller_dos_4_phm_remaining_range
    canister_volume: number.violet_pool_controller_ph_kanister_volumen
    target_value: number.violet_pool_controller_ph_sollwert
    can_reset: sensor.violet_pool_controller_dos_4_phm_last_can_reset

  ## pH- Dosierung (Dosage 2)
  ph_minus:
    entity: switch.violet_pool_controller_dosierung_ph_2
    mode: select.violet_pool_controller_ph_dosierung_modus_2
    status: sensor.violet_pool_controller_ph_dosierung_status_2
    last_on: sensor.violet_pool_controller_dos_2_elo_last_on
    last_off: sensor.violet_pool_controller_dos_2_elo_last_off
    runtime: sensor.violet_pool_controller_dos_2_elo_runtime
    daily_amount: sensor.violet_pool_controller_dos_2_elo_daily_dosing_amount_ml
    total_amount: sensor.violet_pool_controller_dos_2_elo_total_can_amount_ml
    canister_volume: number.violet_pool_controller_ph_kanister_volumen_2

  ## pH- Reverse Dosierung (Dosage 3)
  ph_minus_reverse:
    entity: switch.violet_pool_controller_dosierung_ph
    runtime: sensor.violet_pool_controller_dos_3_elo_rev_runtime
    last_on: sensor.violet_pool_controller_dos_3_elo_rev_last_on
    last_off: sensor.violet_pool_controller_dos_3_elo_rev_last_off

  ## Flockungsmittel Dosierung (Dosage 6)
  flocculant:
    entity: switch.violet_pool_controller_flockmittel
    status: sensor.violet_pool_controller_flockung_status
    last_on: sensor.violet_pool_controller_dos_6_floc_last_on
    last_off: sensor.violet_pool_controller_dos_6_floc_last_off
    runtime: sensor.violet_pool_controller_dos_6_floc_runtime
    daily_amount: sensor.violet_pool_controller_dos_6_floc_daily_dosing_amount_ml
    total_amount: sensor.violet_pool_controller_dos_6_floc_total_can_amount_ml
    remaining_range: sensor.violet_pool_controller_dos_6_floc_remaining_range
    canister_volume: number.violet_pool_controller_flockulant_kanister_volumen

## Chemie Messwerte
chemistry:
  ph_value: sensor.violet_pool_controller_ph_wert
  ph_value_max: sensor.violet_pool_controller_ph_value_max
  ph_value_min: sensor.violet_pool_controller_ph_value_min
  ph_target: number.violet_pool_controller_ph_sollwert

  orp_value: sensor.violet_pool_controller_redoxpotential
  orp_value_max: sensor.violet_pool_controller_orp_value_max
  orp_value_min: sensor.violet_pool_controller_orp_value_min
  orp_target: number.violet_pool_controller_redox_sollwert

  chlorine_value: sensor.violet_pool_controller_chlorgehalt
  chlorine_max: sensor.violet_pool_controller_pot_value_max
  chlorine_min: sensor.violet_pool_controller_pot_value_min
  chlorine_target: number.violet_pool_controller_chlor_sollwert

