name: Auto Build Dist

on:
  push:
    branches:
      - '**'
    paths:
      - 'src/**'
      - 'rollup.config.mjs'
      - 'tsconfig.json'
      - 'package.json'
      - 'package-lock.json'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Commit Dist
    runs-on: ubuntu-latest
    # Skip if the commit was made by the bot itself (prevents infinite loop)
    if: "!contains(github.event.head_commit.message, '[skip ci]') && github.actor != 'github-actions[bot]'"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build dist
        run: |
          npm run build
          npm run build:info

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet dist/violet-pool-card.js info.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ dist/violet-pool-card.js and info.md are already up to date"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ Updates found in dist/violet-pool-card.js or info.md"
          fi

      - name: Commit and push updated files
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/violet-pool-card.js info.md
          git commit -m "build: update auto-generated files [skip ci]"
          git push
          echo "✅ Pushed updated files to ${{ github.ref_name }}"
